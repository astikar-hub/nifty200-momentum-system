name: Run Strategy Monthly and Weekly

on:
  schedule:
    # Run at 6:30 PM IST (1:00 PM UTC) on the last day of each month.
    - cron: "0 13 28-31 * *"  # Runs on the last day of the month at 1:00 PM UTC (6:30 PM IST)
    
    # Run at 6:30 PM IST (1:00 PM UTC) every Friday.
    - cron: "0 13 * * 5"  # Runs every Friday at 1:00 PM UTC (6:30 PM IST)

  workflow_dispatch:  # Allows manual trigger via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Run Strategy
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python strategy.py  # Run the strategy script
